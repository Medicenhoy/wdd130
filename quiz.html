<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="a short quiz about css">
    <meta name="Author" content="Eloy Martinez">
    <title>CSS QUIZ</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <h1>WDD 130 | CSS Form </h1>
    <h3>Basic HTML and CSS quiz</h3>
    <fieldset>
        <form>
            <label for="q1">What does the acronym CSS stand for?</label><br>
            <input type="text" name="q1" id="q1" required><br>
            <label for="q2">Which CSS property is used to change the text color of an element?</label><br>
            <textarea name="q2" id="q2" cols="30" rows="10" required></textarea><br>
            <label for="q3">Which of the following is valid CSS comment?</label><br>
            <select name="q3" id="q3" required>
                <option value="" >Choose one...</option>
                <option value="option-1"> ..__.. </option>
                <option value="option-2">  /* */  </option>
                <option value="option-3"> >--:> </option>
                <option value="option-4"> # </option>
            </select><br>
            <label for="q4">How do you display a border like this:</label><br>
            <img src="imagen/questioncss.png" alt="reference"><br>
            <input type="text" name="q4" id="q4" required><br>
            <button type="submit">SUBMIT</button>
        </form>
    </fieldset>
    
</body>
</html>
